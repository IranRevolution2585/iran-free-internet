<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Subject: Urgent Appeal: Internet Access and Humanitarian Support in Iran</title>
</head>
<body style="text-align:center; font-family:sans-serif; padding:40px;">

  <h2>Support People in Iran</h2>
  <p>Click the button below to send an email.</p>

  <button onclick="sendEmail()" style="padding:15px; font-size:18px;">
    Send Email
  </button>

  <script>
    function sendEmail() {
      const subject = encodeURIComponent("Urgent Appeal: Internet Access and Humanitarian Support in Iran");
      const body = encodeURIComponent(
`Dear Sir or Madam,

I am writing to urgently bring your attention to the ongoing humanitarian and information crisis in Iran. Large parts of the country have been experiencing prolonged internet disruptions, leaving millions of people cut off from the outside world and unable to share or access vital information. According to NetBlocks, internet connectivity had been interrupted for over 528 hours as of March 22, 2026.

Simultaneously, there have been widespread reports of arrests, imprisonment, and executions of protesters. Independent verification of these events is extremely difficult due to the lack of reliable communication channels. Families remain without news of their loved ones, and the international community has limited awareness of the full extent of the crisis.

Access to open and secure communication is not merely a convenience—it is a fundamental human right and a critical tool for transparency, safety, and accountability. In crises such as this, connectivity can prevent further harm by enabling documentation, communication, and global awareness.

I respectfully urge your organization to consider possible actions to:
- Support the restoration or provision of reliable internet access in Iran
- Explore technological solutions to bypass censorship and shutdowns
- Assist humanitarian organizations in maintaining communication channels
- Raise international awareness of the ongoing situation

Even modest efforts to restore connectivity or increase visibility can significantly impact the safety and well-being of those affected.

Thank you for your time and for any actions you can take to address this urgent matter.


Sincerely,  
A Concerned Iranian Citizen`
      );

      const mailtoLink = `mailto:BernACS@state.gov` +
                         `?bcc=osd.pa.dutyofficer@mail.mil,starshield@spacex.com,tiffany.slopka@us.af.mil,PAPressDuty@state.gov,StarlinkGSA@spacex.com,training@nethope.org,emergency@nethope.org` +
                         `&subject=${subject}&body=${body}`;

      window.location.href = mailtoLink;
    }
  </script>

</body>
</html>
